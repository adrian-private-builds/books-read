<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Reading List</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f3ef; color: #2c2825; min-height: 100vh; }

  header { background: #fff; border-bottom: 1px solid #e5e0d8; padding: 2rem; text-align: center; }
  header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; color: #1a1714; }
  header p { color: #9a9590; margin-top: 0.4rem; font-size: 0.95rem; }

  .stats { display: flex; justify-content: center; gap: 2rem; padding: 1.5rem 2rem; background: #fff; border-bottom: 1px solid #e5e0d8; flex-wrap: wrap; }
  .stat { text-align: center; }
  .stat-value { font-size: 1.8rem; font-weight: 700; color: #8b6a3e; }
  .stat-label { font-size: 0.75rem; color: #9a9590; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

  .controls { padding: 1.2rem 2rem; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; max-width: 920px; margin: 0 auto; }
  input[type=search], select {
    background: #fff; border: 1px solid #ddd8d0; color: #2c2825;
    padding: 0.55rem 1rem; border-radius: 8px; font-size: 0.9rem; outline: none;
  }
  input[type=search] { flex: 1; min-width: 200px; }
  input[type=search]:focus, select:focus { border-color: #8b6a3e; }
  select { cursor: pointer; }
  .count { margin-left: auto; color: #9a9590; font-size: 0.85rem; white-space: nowrap; }

  .list { max-width: 920px; margin: 0 auto; padding: 0 2rem 2rem; display: flex; flex-direction: column; }

  .row {
    display: flex; align-items: center; gap: 1rem;
    padding: 0.7rem 0; border-bottom: 1px solid #ede9e3;
  }
  .row:first-child { border-top: 1px solid #ede9e3; }

  .cover {
    width: 36px; height: 52px; flex-shrink: 0; border-radius: 3px;
    background: var(--c); position: relative; overflow: hidden;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.10), inset -2px 0 4px rgba(0,0,0,0.08);
  }
  .cover::after {
    content: ''; position: absolute; top: 0; left: 0; bottom: 0; width: 4px;
    background: rgba(0,0,0,0.12);
  }

  .row-body { flex: 1; min-width: 0; }
  .row-title { font-size: 0.92rem; font-weight: 600; color: #1a1714; line-height: 1.4; }
  .row-author { font-size: 0.78rem; color: #9a9590; margin-top: 2px; }
  .row-meta { display: flex; gap: 0.5rem; flex-shrink: 0; justify-content: flex-end; width: 220px; }

  .badge {
    font-size: 0.68rem; padding: 2px 7px; border-radius: 20px;
    border: 1px solid #e5e0d8; white-space: nowrap;
  }
  .badge.year { color: #4a8a78; border-color: #4a8a7822; background: #eef6f4; }
  .badge.pages { color: #6a58a4; border-color: #6a58a422; background: #f2f0f8; }

  .view-toggle { display: flex; gap: 0.3rem; }
  .view-btn {
    background: #fff; border: 1px solid #ddd8d0; color: #9a9590;
    padding: 0.5rem 0.65rem; border-radius: 8px; cursor: pointer; font-size: 0.9rem;
    line-height: 1; transition: border-color 0.15s, color 0.15s;
  }
  .view-btn.active { border-color: #8b6a3e; color: #8b6a3e; }

  .no-results { text-align: center; color: #9a9590; padding: 4rem; font-size: 1rem; }

  /* Grid view */
  .grid-view { max-width: 1200px; margin: 0 auto; padding: 0 2rem 2rem;
    display: none; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 1.2rem; }
  .grid-view.active { display: grid; }
  .list.active { display: flex; }
  .list { display: none; }

  .grid-card { cursor: default; }
  .grid-cover {
    width: 100%; aspect-ratio: 2/3; border-radius: 4px;
    background: var(--c); position: relative; overflow: hidden;
    box-shadow: 3px 3px 8px rgba(0,0,0,0.13), inset -3px 0 6px rgba(0,0,0,0.08);
    display: flex; align-items: flex-start;
  }
  .grid-cover::after {
    content: ''; position: absolute; top: 0; left: 0; bottom: 0; width: 5px;
    background: rgba(0,0,0,0.12);
  }
  .grid-title {
    position: relative; z-index: 1;
    padding: 0.5rem 0.5rem 0.4rem 0.65rem;
    font-size: 0.68rem; font-weight: 700; line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 9; -webkit-box-orient: vertical; overflow: hidden;
    width: 100%; align-self: flex-start;
  }

  @media (max-width: 640px) {
    .row-meta { width: auto; }
    .controls { padding: 1rem; }
    .list { padding: 0 1rem 2rem; }
    .grid-view { padding: 0 1rem 2rem; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
  }
</style>
</head>
<body>

<header>
  <h1>My Reading List</h1>
  <p>Books I have read</p>
</header>

<div class="stats">
  <div class="stat"><div class="stat-value">1024</div><div class="stat-label">Books Read</div></div>
  <div class="stat"><div class="stat-value">331,516</div><div class="stat-label">Total Pages</div></div>
</div>

<div class="controls">
  <input type="search" id="search" placeholder="Search by title or author..." oninput="filter()">
  <select id="sort" onchange="filter()">
    <option value="author">Author A–Z</option>
    <option value="date">Most Recently Read</option>
    <option value="pages">Most Pages</option>
    <option value="year">Publication Year</option>
    <option value="title">Title A–Z</option>
  </select>
  <span class="count" id="count"></span>
  <div class="view-toggle">
    <button class="view-btn" id="btn-list" onclick="setView('list')" title="List view">☰</button>
    <button class="view-btn active" id="btn-grid" onclick="setView('grid')" title="Grid view">⊞</button>
  </div>
</div>

<div class="list" id="list"></div>
<div class="grid-view active" id="grid"></div>
<div class="no-results" id="empty" style="display:none">No books found.</div>

function coverIndex(title) {
  let h = 0;
  for (let i = 0; i < title.length; i++) h = (h * 31 + title.charCodeAt(i)) >>> 0;

}

function formatDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('/');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[parseInt(m)-1] + ' ' + parseInt(day) + ', ' + y;
}

function filter() {
  const q = document.getElementById('search').value.toLowerCase();
  const sort = document.getElementById('sort').value;

  let books = BOOKS.filter(b => {
    if (q && !b.t.toLowerCase().includes(q) && !b.a.toLowerCase().includes(q)) return false;
    return true;
  });

  books = [...books].sort((a, b) => {
    if (sort === 'author') return a.a.localeCompare(b.a) || (parseInt(a.y) || 9999) - (parseInt(b.y) || 9999);
    if (sort === 'date') return (b.d || '').localeCompare(a.d || '');
    if (sort === 'pages') return b.p - a.p;
    if (sort === 'year') return (b.y || '').localeCompare(a.y || '');
    if (sort === 'title') return a.t.localeCompare(b.t);
    return 0;
  });

  document.getElementById('count').textContent = books.length + ' book' + (books.length !== 1 ? 's' : '');
  document.getElementById('empty').style.display = books.length === 0 ? '' : 'none';

  document.getElementById('list').innerHTML = books.map(b => `
    <div class="row">
      <div class="cover" style="--c:${coverColor(b.t)}"></div>
      <div class="row-body">
        <div class="row-title">${b.t}</div>
        <div class="row-author">${b.a}</div>
      </div>
      <span class="row-meta">
        ${b.y ? `<span class="badge year">${b.y}</span>` : ''}
        ${b.p ? `<span class="badge pages">${b.p} pages</span>` : ''}
      </span>
    </div>
  `).join('');

  document.getElementById('grid').innerHTML = books.map(b => `
    <div class="grid-card">
      <div class="grid-cover" style="--c:${coverColor(b.t)}">
        <div class="grid-title" style="color:${coverTextColor(b.t)}">${b.t.replace(/\s*(\([^)]+\))/g, '<br><span style="font-weight:400">$1</span>')}</div>
      </div>
    </div>
  `).join('');
}

let currentView = 'grid';
function setView(v) {
  currentView = v;
  document.getElementById('list').classList.toggle('active', v === 'list');
  document.getElementById('grid').classList.toggle('active', v === 'grid');
  document.getElementById('btn-list').classList.toggle('active', v === 'list');
  document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
}

filter();
</script>
